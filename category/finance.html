<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance | Boldly Balance</title>
    <link rel="canonical" href="https://boldlybalance.life/category/finance.html">
    <meta name="description" content="Explore our Finance articles and guides for a healthier, balanced life.">
    <meta property="og:title" content="Finance | Boldly Balance">
    <meta property="og:description" content="Explore our Finance articles and guides for a healthier, balanced life.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://boldlybalance.life/category/finance.html">
    <meta property="og:image" content="https://images.unsplash.com/photo-1506126613408-eca07ce68773?w=1200&h=630&fit=crop">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Finance | Boldly Balance">
    <meta name="twitter:description" content="Explore our Finance articles and guides for a healthier, balanced life.">
    <link rel="stylesheet" href="../styles.css">
    <script>
        const categorySlug = "finance";
        const categoryName = "Finance";
    </script>
</head>
<body>
    <header>
        <nav>
            <a href="../" class="logo">Boldly Balance</a>
            <div class="nav-links">
                <div class="dropdown">
                    <a href="../">Home ▾</a>
                    <div class="dropdown-content">
                        <a href="../category/fitness.html">Fitness</a>
                        <a href="../category/food.html">Food</a>
                        <a href="../category/sleep.html">Sleep</a>
                        <a href="../category/mind.html">Mind</a>
                        <a href="../category/wellness.html">Wellness</a>
                        <a href="../category/lifestyle.html">Lifestyle</a>
                        <a href="../category/tech.html">Tech</a>
                        <a href="../category/recovery.html">Recovery</a>
                        <a href="../category/finance.html">Finance</a>
                    </div>
                </div>
            </div>
        </nav>
    </header>
    <main>
        <section class="hero" style="padding: 3rem 2rem;">
            <h1 id="cat-title">Loading...</h1>
            <p>Browse all <span id="cat-name">CATEGORY</span> articles.</p>
        </section>
        <section class="posts">
            <div class="post-grid" id="category-posts">
            </div>
        </section>
    </main>
    <footer>
        <p>© 2026 Boldly Balance.</p>
    </footer>
    <script>
        async function loadCategoryPosts() {
            try {
                const response = await fetch('../posts.json');
                const allPosts = await response.json();
                const categoryPosts = allPosts.filter(p => p.category === categoryName);
                categoryPosts.sort((a, b) => new Date(b.date) - new Date(a.date));
                document.getElementById('cat-title').textContent = categoryName;
                document.title = categoryName + ' | Boldly Balance';
                const container = document.getElementById('category-posts');
                if (categoryPosts.length === 0) {
                    container.innerHTML = '<p>No articles in this category yet.</p>';
                    return;
                }
                container.innerHTML = categoryPosts.map(post => `
                    <a href="../posts/${post.slug}.html" class="post-card">
                        <div class="post-card-image">
                            <img loading="lazy" src="https://images.unsplash.com/${post.image}?w=1200&q=80" alt="${post.title} cover">
                        </div>
                        <div class="post-card-content">
                            <span class="tag">${post.category}</span>
                            <h3>${post.title}</h3>
                            <p>${post.excerpt}</p>
                            <span class="read-more">Read more</span>
                        </div>
                    </a>
                `).join('');
            } catch (e) {
                console.error('Error loading posts:', e);
            }
        }
        loadCategoryPosts();
    </script>
</body>
</html>
